<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>쿠폰 받기 · 스터디언 클래스</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* =====================================================================
     설정(CONFIG)은 맨 아래 <script>의 CONFIG 객체에서 바꿉니다.
     - registerUrl : "마이페이지에서 쿠폰 등록하기" 버튼이 이동할 주소
     - deadlineISO : 유효기간(한국시간 고정). 현재 2026-07-05 23:59:59 KST
     - defaultCode : ?code= 없을 때 표시할 샘플
     쿠폰번호는 URL ?code= 값에서 읽고, 복사 시 공백 없이 12자리 그대로 복사됩니다.
     로고/트로피 이미지는 파일에 내장되어 있습니다.
     ===================================================================== */
  :root{
    --navy:#1C2340;
    --purple:#6B4BD6;
    --purple-deep:#5230BE;
    --muted:#5E5290;
    --notch:#E4D9F5;
    --line:rgba(120,100,190,.42);
    --btn1a:#DB4296; --btn1b:#7044CE;   /* 복사 버튼 그라데이션(진하게) */
    --btn2a:#8270E4; --btn2b:#5A45C6;
    --ghost-border:rgba(110,90,200,.35);
    --ok:#2E9E6B; --danger:#D6456B;
    --radius:26px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:var(--navy);
    min-height:100dvh;
    background:
      radial-gradient(120% 60% at 50% 0%, #FBF6FF 0%, rgba(251,246,255,0) 60%),
      linear-gradient(180deg,#EFE9FB 0%, #E4D9F5 52%, #DACDF0 100%);
    background-attachment:fixed;
    display:flex;justify-content:center;
    padding:28px 18px calc(28px + env(safe-area-inset-bottom));
    line-height:1.5;
  }
  .wrap{width:100%;max-width:440px}

  .logo{display:flex;justify-content:center;margin-bottom:14px}
  .logo img{height:28px;width:auto}

  h1{text-align:center;font-size:clamp(20px,5.6vw,25px);font-weight:800;margin:0 0 8px;letter-spacing:-.01em;line-height:1.32}
  .sub{text-align:center;color:var(--purple);font-size:clamp(14px,4vw,16px);font-weight:700;margin:0 0 12px}

  .hero{display:flex;justify-content:center;margin:0 0 16px}
  .hero img{width:64%;max-width:240px;height:auto;filter:drop-shadow(0 12px 24px rgba(150,90,210,.28))}

  .count{
    display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
    background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-radius:16px;padding:12px 16px;margin:0 0 18px;
    box-shadow:0 8px 22px rgba(110,80,180,.14);
  }
  .count .lbl{font-size:13px;color:var(--muted);font-weight:700}
  .count .time{font-weight:800;font-size:clamp(16px,4.6vw,19px);color:var(--purple-deep);font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .count.is-over .time{color:var(--danger);font-size:15px}

  /* 카드: 흰색 대신 라일락 그라데이션 글래스 */
  .ticket{
    position:relative;border-radius:var(--radius);
    background:linear-gradient(165deg, rgba(248,243,255,.82) 0%, rgba(226,214,247,.62) 100%);
    border:1px solid rgba(255,255,255,.85);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:0 22px 50px rgba(95,60,165,.22), inset 0 1px 0 rgba(255,255,255,.7);
    overflow:hidden;
  }
  .ticket__top{padding:24px 22px 20px;text-align:center}
  .ticket__label{font-size:13px;letter-spacing:.06em;color:var(--muted);font-weight:700;margin:0 0 10px}
  .code{
    font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Pretendard",sans-serif;
    font-size:clamp(27px,8.4vw,37px);font-weight:800;letter-spacing:.03em;
    color:var(--purple-deep);word-break:break-all;
    user-select:all;-webkit-user-select:all;padding:2px 0;
  }
  .perf{position:relative;height:0;border-top:2px dashed var(--line);margin:0 24px}
  .perf::before,.perf::after{content:"";position:absolute;top:-13px;width:26px;height:26px;background:var(--notch);border-radius:50%}
  .perf::before{left:-37px}
  .perf::after{right:-37px}
  .ticket__bottom{padding:22px}

  .btn{
    position:relative;display:flex;align-items:center;justify-content:center;
    width:100%;border:none;border-radius:15px;cursor:pointer;
    font-family:inherit;font-size:16px;font-weight:700;padding:17px 48px;
    text-decoration:none;transition:transform .08s ease,filter .15s ease;margin-bottom:11px;
  }
  .btn:last-child{margin-bottom:0}
  .btn:active{transform:scale(.985)}
  .btn .num{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .btn .ic{position:absolute;right:18px;top:50%;transform:translateY(-50%);display:flex}
  .btn .ic svg{width:20px;height:20px}
  .btn--copy{background:linear-gradient(90deg,var(--btn1a),var(--btn1b));color:#fff;box-shadow:0 10px 24px rgba(160,70,180,.38)}
  .btn--copy .num{background:rgba(255,255,255,.30);color:#fff}
  .btn--copy.is-done{background:var(--ok);box-shadow:0 10px 22px rgba(46,158,107,.3)}
  .btn--go{background:linear-gradient(90deg,var(--btn2a),var(--btn2b));color:#fff;box-shadow:0 10px 22px rgba(110,80,210,.32)}
  .btn--go .num{background:rgba(255,255,255,.28);color:#fff}
  .btn--ghost{background:rgba(255,255,255,.4);color:var(--purple-deep);border:1px solid var(--ghost-border);font-size:15px}

  .how{margin:18px 4px 0}
  .how__t{font-size:13.5px;font-weight:800;color:var(--navy);margin:0 0 8px}
  .how ol{list-style:none;padding:0;margin:0}
  .how li{display:flex;gap:9px;align-items:flex-start;color:var(--navy);font-weight:700;font-size:13.5px;margin-bottom:6px}
  .how .n{flex:0 0 auto;width:19px;height:19px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}

  .note{text-align:center;color:var(--muted);font-size:12.5px;font-weight:500;margin:18px 6px 0;line-height:1.65}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:10}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){.btn,.toast{transition:none}}
</style>
</head>

    deadlineISO: "2026-07-05T23:59:59+09:00",             // ← 유효기간(한국시간 고정)
    defaultCode: "TEST12341234"                           // ← ?code= 없을 때 샘플
  };
  /* =============================================== */

  const params  = new URLSearchParams(location.search);
  const rawCode = ((params.get("code") || CONFIG.defaultCode) || "").trim().toUpperCase().replace(/\s+/g,"");

  const codeEl  = document.getElementById("code");
  const copyBtn = document.getElementById("copyBtn");
  const goBtn   = document.getElementById("goBtn");
  const giftBtn = document.getElementById("giftBtn");
  const toast   = document.getElementById("toast");
  const timeEl  = document.getElementById("time");
  const countEl = document.getElementById("count");

  const pretty = c => c.replace(/(.{4})/g,"$1 ").trim();   // 화면 표시용(4자리씩)
  codeEl.textContent = rawCode ? pretty(rawCode) : "쿠폰번호 없음";   // 복사는 공백 없는 원본
  goBtn.href = CONFIG.registerUrl;

  const DEADLINE = new Date(CONFIG.deadlineISO).getTime();
  const pad = n => String(n).padStart(2,"0");
  function tick(){
    let diff = DEADLINE - Date.now();
    if(diff <= 0){
      countEl.classList.add("is-over");
      timeEl.textContent = "유효기간이 종료되었어요";
      countEl.querySelector(".lbl").style.display = "none";
      clearInterval(timer); return;
    }
    const d = Math.floor(diff/86400000); diff -= d*86400000;
    const h = Math.floor(diff/3600000);  diff -= h*3600000;
    const m = Math.floor(diff/60000);    diff -= m*60000;
    const s = Math.floor(diff/1000);
    timeEl.textContent = d + "일 " + pad(h) + "시간 " + pad(m) + "분 " + pad(s) + "초";
  }
  tick();
  const timer = setInterval(tick, 1000);

  let toastTimer;
  function showToast(msg){
    toast.textContent = msg; toast.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove("show"), 1800);
  }
  async function copyText(text){
    try{ if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); return true; } }catch(e){}
    try{
      const ta=document.createElement("textarea"); ta.value=text; ta.setAttribute("readonly","");
      ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,text.length);
      const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok;
    }catch(e){ return false; }
  }
  copyBtn.addEventListener("click", async ()=>{
    if(!rawCode) return;
    const ok = await copyText(rawCode);
    const n = copyBtn.querySelector(".num");
    if(ok){
      copyBtn.classList.add("is-done"); if(n) n.textContent="✓";
      showToast("쿠폰번호가 복사됐어요 ✓");
      setTimeout(()=>{ copyBtn.classList.remove("is-done"); if(n) n.textContent="1"; }, 2200);
    }else{ showToast("번호를 길게 눌러 복사해 주세요"); }
  });
  giftBtn.addEventListener("click", async ()=>{
    const ok = await copyText(location.href);
    showToast(ok ? "선물 링크가 복사됐어요. 카톡에 붙여넣기 하세요 🎁" : "링크 복사에 실패했어요");
  });
</script>
</body>
</html>
